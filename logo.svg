<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512"
  height="512"
  role="img"
  aria-labelledby="logo-title logo-desc"
>
  <title id="logo-title">Azure DevOps Chrome Extension Logo</title>
  <desc id="logo-desc">A circular browser-inspired mark with connected pipeline nodes and a stylized A monogram.</desc>

  <defs>
    <linearGradient id="ringGradient" x1="72" y1="256" x2="440" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <linearGradient id="coreGradient" x1="256" y1="136" x2="256" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="256" y1="184" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="#F8FAFC" />

  <g id="outer-ring" filter="url(#softShadow)">
    <circle cx="256" cy="256" r="184" fill="none" stroke="url(#ringGradient)" stroke-width="40" />
  </g>

  <g id="pipeline-links" stroke="#1E40AF" stroke-width="12" stroke-linecap="round" opacity="0.9">
    <line x1="150" y1="184" x2="212" y2="224" />
    <line x1="362" y1="184" x2="300" y2="224" />
    <line x1="196" y1="326" x2="316" y2="326" />
  </g>

  <g id="pipeline-nodes">
    <circle cx="138" cy="176" r="18" fill="#2563EB" />
    <circle cx="374" cy="176" r="18" fill="#0EA5E9" />
    <circle cx="184" cy="326" r="18" fill="#3B82F6" />
    <circle cx="328" cy="326" r="18" fill="#38BDF8" />
  </g>

  <g id="core">
    <circle cx="256" cy="256" r="122" fill="url(#coreGradient)" />
  </g>

  <g id="monogram-a" fill="url(#accentGradient)">
    <path d="M256 184L196 340H228L241 304H271L284 340H316L256 184ZM249 281L256 259L263 281H249Z" />
    <rect x="236" y="296" width="40" height="12" rx="6" />
  </g>
</svg>
