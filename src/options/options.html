<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azure DevOps PR Monitor — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="hero">
    <div class="hero-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Azure DevOps PR Monitor logo">
        <defs>
          <linearGradient id="clAnimRing" x1="72" y1="256" x2="440" y2="256" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#d97757"/><stop offset="100%" stop-color="#6a9bcc"/>
          </linearGradient>
          <linearGradient id="clAnimA" x1="256" y1="188" x2="256" y2="340" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0b89a"/><stop offset="100%" stop-color="#d97757"/>
          </linearGradient>
          <style>
            #cl-ring{stroke-dasharray:1156;stroke-dashoffset:1156;animation:clDrawRing 1.4s ease-out forwards}
            #cl-core{animation:clCoreIn .8s ease-out .3s both;transform-origin:256px 256px}
            #cl-nodes circle{animation:clPulseNode 1.8s ease-in-out infinite}
            #cl-nodes circle:nth-child(1){transform-origin:138px 176px}
            #cl-nodes circle:nth-child(2){transform-origin:374px 176px;animation-delay:.2s}
            #cl-nodes circle:nth-child(3){transform-origin:184px 326px;animation-delay:.4s}
            #cl-nodes circle:nth-child(4){transform-origin:328px 326px;animation-delay:.6s}
            #cl-links line{stroke-dasharray:80;stroke-dashoffset:80;animation:clDrawLink .6s ease-out forwards}
            #cl-links line:nth-child(1){animation-delay:.6s}
            #cl-links line:nth-child(2){animation-delay:.8s}
            #cl-links line:nth-child(3){animation-delay:1s}
            #cl-markA{animation:clMarkIn .9s ease-out .9s both;transform-origin:256px 256px}
            @keyframes clDrawRing{from{stroke-dashoffset:1156}to{stroke-dashoffset:0}}
            @keyframes clCoreIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
            @keyframes clPulseNode{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.75}}
            @keyframes clDrawLink{from{stroke-dashoffset:80}to{stroke-dashoffset:0}}
            @keyframes clMarkIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
            @media(prefers-reduced-motion:reduce){*{animation:none!important}}
          </style>
        </defs>
        <rect width="512" height="512" fill="#faf9f5"/>
        <circle id="cl-ring" cx="256" cy="256" r="184" fill="none" stroke="url(#clAnimRing)" stroke-width="40"/>
        <g id="cl-core"><circle cx="256" cy="256" r="122" fill="#141413"/></g>
        <g id="cl-links" stroke="#a85a3a" stroke-width="12" stroke-linecap="round" opacity="0.85">
          <line x1="150" y1="184" x2="212" y2="224"/><line x1="362" y1="184" x2="300" y2="224"/>
          <line x1="196" y1="326" x2="316" y2="326"/>
        </g>
        <g id="cl-nodes">
          <circle cx="138" cy="176" r="18" fill="#d97757"/><circle cx="374" cy="176" r="18" fill="#6a9bcc"/>
          <circle cx="184" cy="326" r="18" fill="#788c5d"/><circle cx="328" cy="326" r="18" fill="#b0aea5"/>
        </g>
        <g id="cl-markA" fill="url(#clAnimA)">
          <path d="M256 184L196 340H228L241 304H271L284 340H316L256 184ZM249 281L256 259L263 281H249Z"/>
          <rect x="236" y="296" width="40" height="12" rx="6"/>
        </g>
      </svg>
    </div>
    <h1>Azure DevOps PR Monitor</h1>
    <p class="subtitle">Configure your Azure DevOps projects to monitor for PR activity.</p>
  </div>

  <div class="container">
    <section class="settings-section">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </h2>
      <div id="project-list"></div>

      <div class="add-project-form">
        <h3>Add Project</h3>
        <div class="form-row">
          <label for="org">Organization</label>
          <input type="text" id="org" placeholder="myorg" />
        </div>
        <div class="form-row">
          <label for="project">Project</label>
          <input type="text" id="project" placeholder="MyProject" />
        </div>
        <div class="form-row">
          <label for="pat">Personal Access Token</label>
          <input type="password" id="pat" placeholder="Needs Code (read) scope" />
        </div>
        <div class="form-row">
          <label for="jira-domain">Jira Domain (optional)</label>
          <input type="text" id="jira-domain" placeholder="arancia or arancia.atlassian.net" />
        </div>
        <button id="add-btn" class="btn btn-primary">Add &amp; Verify Connection</button>
        <div id="add-status" class="status-msg"></div>
      </div>
    </section>

    <section class="settings-section">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        General
      </h2>
      <div class="form-row">
        <label for="poll-interval">Poll interval (minutes)</label>
        <input type="number" id="poll-interval" min="1" max="60" value="2" />
      </div>
      <div class="form-row checkbox-row">
        <input type="checkbox" id="notif-enabled" checked />
        <label for="notif-enabled">Enable desktop notifications</label>
      </div>
      <button id="save-general-btn" class="btn">Save</button>
      <div id="general-status" class="status-msg"></div>
    </section>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
