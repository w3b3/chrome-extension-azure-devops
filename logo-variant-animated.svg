<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512"
  height="512"
  role="img"
  aria-labelledby="logo-anim-title logo-anim-desc"
>
  <title id="logo-anim-title">Azure DevOps Extension Logo Animated Variant</title>
  <desc id="logo-anim-desc">Animated logo with ring draw-in, node pulse, and monogram fade-up.</desc>

  <defs>
    <linearGradient id="animRing" x1="72" y1="256" x2="440" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <linearGradient id="animA" x1="256" y1="188" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <style>
      #ring {
        stroke-dasharray: 1040;
        stroke-dashoffset: 1040;
        animation: drawRing 1.4s ease-out forwards;
      }

      #core {
        animation: coreIn 0.8s ease-out 0.3s both;
        transform-origin: 256px 256px;
      }

      #nodes circle {
        animation: pulseNode 1.8s ease-in-out infinite;
        transform-origin: 256px 256px;
      }

      #nodes circle:nth-child(2) { animation-delay: 0.2s; }
      #nodes circle:nth-child(3) { animation-delay: 0.4s; }
      #nodes circle:nth-child(4) { animation-delay: 0.6s; }

      #markA {
        animation: markIn 0.9s ease-out 0.9s both;
        transform-origin: 256px 256px;
      }

      @keyframes drawRing {
        from { stroke-dashoffset: 1040; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes coreIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes pulseNode {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.75; }
      }

      @keyframes markIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </defs>

  <rect width="512" height="512" fill="#F8FAFC" />

  <circle id="ring" cx="256" cy="256" r="184" fill="none" stroke="url(#animRing)" stroke-width="40" />

  <g id="core">
    <circle cx="256" cy="256" r="122" fill="#111827" />
  </g>

  <g id="links" stroke="#1E40AF" stroke-width="12" stroke-linecap="round" opacity="0.9">
    <line x1="150" y1="184" x2="212" y2="224" />
    <line x1="362" y1="184" x2="300" y2="224" />
    <line x1="196" y1="326" x2="316" y2="326" />
  </g>

  <g id="nodes" fill="#38BDF8">
    <circle cx="138" cy="176" r="18" />
    <circle cx="374" cy="176" r="18" />
    <circle cx="184" cy="326" r="18" />
    <circle cx="328" cy="326" r="18" />
  </g>

  <g id="markA" fill="url(#animA)">
    <path d="M256 184L196 340H228L241 304H271L284 340H316L256 184ZM249 281L256 259L263 281H249Z" />
    <rect x="236" y="296" width="40" height="12" rx="6" />
  </g>
</svg>
