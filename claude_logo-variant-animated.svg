<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512"
  height="512"
  role="img"
  aria-labelledby="cl-anim-title cl-anim-desc"
>
  <title id="cl-anim-title">Azure DevOps Extension Logo - Claude Animated Variant</title>
  <desc id="cl-anim-desc">Animated Claude-branded logo with ring draw-in, node pulse, and monogram fade-up.</desc>

  <defs>
    <linearGradient id="clAnimRing" x1="72" y1="256" x2="440" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d97757" />
      <stop offset="100%" stop-color="#6a9bcc" />
    </linearGradient>
    <linearGradient id="clAnimA" x1="256" y1="188" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0b89a" />
      <stop offset="100%" stop-color="#d97757" />
    </linearGradient>
    <style>
      #cl-ring {
        stroke-dasharray: 1156;
        stroke-dashoffset: 1156;
        animation: clDrawRing 1.4s ease-out forwards;
      }

      #cl-core {
        animation: clCoreIn 0.8s ease-out 0.3s both;
        transform-origin: 256px 256px;
      }

      #cl-nodes circle {
        animation: clPulseNode 1.8s ease-in-out infinite;
      }

      #cl-nodes circle:nth-child(1) { transform-origin: 138px 176px; }
      #cl-nodes circle:nth-child(2) { transform-origin: 374px 176px; animation-delay: 0.2s; }
      #cl-nodes circle:nth-child(3) { transform-origin: 184px 326px; animation-delay: 0.4s; }
      #cl-nodes circle:nth-child(4) { transform-origin: 328px 326px; animation-delay: 0.6s; }

      #cl-links line {
        stroke-dasharray: 80;
        stroke-dashoffset: 80;
        animation: clDrawLink 0.6s ease-out forwards;
      }

      #cl-links line:nth-child(1) { animation-delay: 0.6s; }
      #cl-links line:nth-child(2) { animation-delay: 0.8s; }
      #cl-links line:nth-child(3) { animation-delay: 1.0s; }

      #cl-markA {
        animation: clMarkIn 0.9s ease-out 0.9s both;
        transform-origin: 256px 256px;
      }

      @keyframes clDrawRing {
        from { stroke-dashoffset: 1156; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes clCoreIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes clPulseNode {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.75; }
      }

      @keyframes clDrawLink {
        from { stroke-dashoffset: 80; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes clMarkIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </defs>

  <rect width="512" height="512" fill="#faf9f5" />

  <circle id="cl-ring" cx="256" cy="256" r="184" fill="none" stroke="url(#clAnimRing)" stroke-width="40" />

  <g id="cl-core">
    <circle cx="256" cy="256" r="122" fill="#141413" />
  </g>

  <g id="cl-links" stroke="#a85a3a" stroke-width="12" stroke-linecap="round" opacity="0.85">
    <line x1="150" y1="184" x2="212" y2="224" />
    <line x1="362" y1="184" x2="300" y2="224" />
    <line x1="196" y1="326" x2="316" y2="326" />
  </g>

  <g id="cl-nodes">
    <circle cx="138" cy="176" r="18" fill="#d97757" />
    <circle cx="374" cy="176" r="18" fill="#6a9bcc" />
    <circle cx="184" cy="326" r="18" fill="#788c5d" />
    <circle cx="328" cy="326" r="18" fill="#b0aea5" />
  </g>

  <g id="cl-markA" fill="url(#clAnimA)">
    <path d="M256 184L196 340H228L241 304H271L284 340H316L256 184ZM249 281L256 259L263 281H249Z" />
    <rect x="236" y="296" width="40" height="12" rx="6" />
  </g>
</svg>
